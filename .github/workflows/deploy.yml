name: Build and Publish Blog

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [notion-content-updated]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "blog-publish"
  cancel-in-progress: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v6

      - name: Derive publish target
        shell: bash
        run: |
          if [ -n "${{ vars.SITE_URL }}" ]; then
            echo "SITE_URL=${{ vars.SITE_URL }}" >> "$GITHUB_ENV"
          else
            echo "SITE_URL=https://example.com" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            echo "BASE_PATH=${{ vars.BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.PAGES_TARGET_REPOSITORY }}" ]; then
            echo "PAGES_TARGET_REPOSITORY=${{ vars.PAGES_TARGET_REPOSITORY }}" >> "$GITHUB_ENV"
          else
            echo "PAGES_TARGET_REPOSITORY=${{ github.repository }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.PAGES_TARGET_BRANCH }}" ]; then
            echo "PAGES_TARGET_BRANCH=${{ vars.PAGES_TARGET_BRANCH }}" >> "$GITHUB_ENV"
          else
            echo "PAGES_TARGET_BRANCH=gh-pages" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.SITE_CNAME }}" ]; then
            echo "SITE_CNAME=${{ vars.SITE_CNAME }}" >> "$GITHUB_ENV"
          else
            echo "SITE_CNAME=" >> "$GITHUB_ENV"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        shell: bash
        run: |
          set -euo pipefail

          attempts=0
          max_attempts=3

          until [ "$attempts" -ge "$max_attempts" ]
          do
            attempts=$((attempts + 1))
            echo "Build attempt ${attempts}/${max_attempts}"

            if npm run build; then
              exit 0
            fi

            if [ "$attempts" -lt "$max_attempts" ]; then
              echo "Build failed, waiting before retry..."
              sleep 20
            fi
          done

          echo "Build failed after ${max_attempts} attempts."
          exit 1
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          PUBLIC_BLOG_TITLE: ${{ vars.PUBLIC_BLOG_TITLE }}
          PUBLIC_BLOG_SUBTITLE: ${{ vars.PUBLIC_BLOG_SUBTITLE }}
          PUBLIC_BLOG_DESCRIPTION: ${{ vars.PUBLIC_BLOG_DESCRIPTION }}
          PUBLIC_BLOG_AUTHOR: ${{ vars.PUBLIC_BLOG_AUTHOR }}
          PUBLIC_BLOG_MOTTO: ${{ vars.PUBLIC_BLOG_MOTTO }}
          PUBLIC_BLOG_GITHUB: ${{ vars.PUBLIC_BLOG_GITHUB }}
          PUBLIC_BLOG_PROFILE: ${{ vars.PUBLIC_BLOG_PROFILE }}
          PUBLIC_BLOG_AVATAR: ${{ vars.PUBLIC_BLOG_AVATAR }}
          PUBLIC_BLOG_LOGO: ${{ vars.PUBLIC_BLOG_LOGO }}
          PUBLIC_BLOG_DEFAULT_COVER: ${{ vars.PUBLIC_BLOG_DEFAULT_COVER }}
          PUBLIC_BLOG_RUNTIME_SINCE: ${{ vars.PUBLIC_BLOG_RUNTIME_SINCE }}
          PUBLIC_BLOG_RECORD_TEXT: ${{ vars.PUBLIC_BLOG_RECORD_TEXT }}
          PUBLIC_BLOG_RECORD_LINK: ${{ vars.PUBLIC_BLOG_RECORD_LINK }}
          SITE_URL: ${{ env.SITE_URL }}
          BASE_PATH: ${{ env.BASE_PATH }}

      - name: Skip publish when token is missing
        if: ${{ !secrets.PUBLISH_TO_PAGES_TOKEN }}
        run: echo "PUBLISH_TO_PAGES_TOKEN is not configured. Build completed, publish skipped."

      - name: Checkout publish repository
        if: ${{ secrets.PUBLISH_TO_PAGES_TOKEN }}
        uses: actions/checkout@v6
        with:
          repository: ${{ env.PAGES_TARGET_REPOSITORY }}
          ref: ${{ env.PAGES_TARGET_BRANCH }}
          token: ${{ secrets.PUBLISH_TO_PAGES_TOKEN }}
          path: .publish-repo

      - name: Publish static site
        if: ${{ secrets.PUBLISH_TO_PAGES_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          shopt -s dotglob nullglob

          if [ -n "${SITE_CNAME}" ]; then
            printf '%s\n' "${SITE_CNAME}" > dist/CNAME
          fi

          find .publish-repo -mindepth 1 -maxdepth 1 \
            ! -name '.git' \
            ! -name '.github' \
            -exec rm -rf {} +

          cp -R dist/. .publish-repo/

          cd .publish-repo

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet --no-ext-diff; then
            echo "No staged changes to publish."
            exit 0
          fi

          git commit -m "Deploy from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "${PAGES_TARGET_BRANCH}"
